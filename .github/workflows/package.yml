# Manual packaging: Linux (AppImage + deb), Windows (portable exe), macOS (DMG) as CI artifacts only (no GitHub Release).
name: Package

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          ELECTRON_BUILDER_PUBLISH: never
      - uses: actions/upload-artifact@v4
        with:
          name: linux-dist
          path: dist/*

