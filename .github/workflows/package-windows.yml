# Manual: Windows (portable exe + MSI) → artifact windows-dist
name: Package (Windows)

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Decode code signing certificate
        env:
          P12_BASE64: ${{ secrets.P12_BASE64 }}
        run: |
          [System.IO.File]::WriteAllBytes('./certificate.p12', [System.Convert]::FromBase64String($env:P12_BASE64))
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          ELECTRON_BUILDER_PUBLISH: never
          CSC_LINK: file://./certificate.p12
          CSC_KEY_PASSWORD: ${{ secrets.P12_PASSWORD }}
      - uses: actions/upload-artifact@v4
        with:
          name: windows-dist
          if-no-files-found: error
          path: |
            dist/*.exe
            dist/*.msi
